<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Main Indigo to Magenta Gradient -->
    <linearGradient id="foldGrad" x1="100" y1="100" x2="412" y2="412" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#5C55E6" />
      <stop offset="100%" stop-color="#E63595" />
    </linearGradient>
    
    <!-- Translucent Overlay Gradient -->
    <linearGradient id="glassGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0.4" />
      <stop offset="100%" stop-color="white" stop-opacity="0.05" />
    </linearGradient>

    <!-- Shadow for Depth -->
    <filter id="foldShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="15" stdDeviation="20" flood-color="#0E0C14" flood-opacity="0.2" />
    </filter>

    <style>
      .fold-piece {
        animation: float 6s ease-in-out infinite;
      }
      .fold-piece:nth-child(2) { animation-delay: -2s; }
      .fold-piece:nth-child(3) { animation-delay: -4s; }

      @keyframes float {
        0%, 100% { transform: translateY(0) rotate(0deg); }
        50% { transform: translateY(-15px) rotate(1deg); }
      }

      .ethereal-group:hover .fold-piece {
        filter: brightness(1.15) saturate(1.2);
        transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      }
    </style>
  </defs>

  <g class="ethereal-group" filter="url(#foldShadow)">
    <!-- The "M" constructed as overlapping 3D folds -->
    
    <!-- Left Fold -->
    <path class="fold-piece" 
          d="M100 400 L180 120 L256 320 L100 400 Z" 
          fill="url(#foldGrad)" fill-opacity="0.9" />
    
    <!-- Right Fold -->
    <path class="fold-piece" 
          d="M412 400 L332 120 L256 320 L412 400 Z" 
          fill="url(#foldGrad)" fill-opacity="0.9" />
          
    <!-- Central Glass Overlay (Glassmorphism Effect) -->
    <path class="fold-piece" 
          d="M180 120 L256 320 L332 120 L256 80 L180 120 Z" 
          fill="url(#glassGrad)" 
          stroke="white" stroke-opacity="0.3" stroke-width="1" />
          
    <!-- Subtle Highlight Paths -->
    <path class="fold-piece" d="M180 120 L256 320" stroke="white" stroke-opacity="0.2" stroke-width="2" />
    <path class="fold-piece" d="M332 120 L256 320" stroke="white" stroke-opacity="0.2" stroke-width="2" />
  </g>
</svg>
