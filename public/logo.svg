<svg width="600" height="120" viewBox="0 0 600 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="foldGradSmall" x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#5C55E6" />
      <stop offset="100%" stop-color="#E63595" />
    </linearGradient>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;600&amp;display=swap');
      .brand-text-m {
        font-family: 'Outfit', sans-serif;
        font-weight: 600;
        font-size: 72px;
        fill: #0E0C14;
        letter-spacing: -1px;
      }
      .brand-text-sub {
        font-family: 'Outfit', sans-serif;
        font-weight: 300;
        font-size: 72px;
        fill: #5C55E6;
      }
      .mini-fold {
        animation: foldIn 1.2s cubic-bezier(0.23, 1, 0.32, 1) forwards;
      }
      @keyframes foldIn {
        from { transform: scale(0.5) rotate(-10deg); opacity: 0; }
        to { transform: scale(1) rotate(0deg); opacity: 1; }
      }
    </style>
  </defs>
  
  <!-- Mini Ethereal Icon -->
  <g class="mini-fold" transform="scale(0.18) translate(60, 60)">
    <path d="M100 400 L180 120 L256 320 Z" fill="url(#foldGradSmall)" />
    <path d="M412 400 L332 120 L256 320 Z" fill="url(#foldGradSmall)" />
    <path d="M180 120 L256 320 L332 120 L256 80 Z" fill="white" fill-opacity="0.2" stroke="white" stroke-opacity="0.3" />
  </g>
  
  <!-- Stylized Brand Text -->
  <text x="145" y="85">
    <tspan class="brand-text-m">Merch</tspan><tspan class="brand-text-sub">ora</tspan>
  </text>
</svg>
